name: Send TripGuide Notification

on:
  workflow_dispatch:
    inputs:
      title:
        description: Notification title
        required: true
        type: string
      body:
        description: Notification body
        required: true
        type: string
      url:
        description: Click URL
        required: false
        default: /TripGuide/
        type: string
      targetType:
        description: Send target
        required: true
        default: allActive
        type: choice
        options:
          - allActive
          - adminsOnly
          - approvedViewers
          - singleUser
      uid:
        description: Required when targetType is singleUser
        required: false
        type: string

jobs:
  send-notification:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    permissions:
      contents: read

    env:
      FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
      FIREBASE_DATABASE_URL: ${{ secrets.FIREBASE_DATABASE_URL }}
      INPUT_TITLE: ${{ inputs.title }}
      INPUT_BODY: ${{ inputs.body }}
      INPUT_URL: ${{ inputs.url }}
      INPUT_TARGETTYPE: ${{ inputs.targetType }}
      INPUT_TARGET_TYPE: ${{ inputs.targetType }}
      INPUT_UID: ${{ inputs.uid }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependency
        run: npm install firebase-admin@12 --no-audit --no-fund --no-package-lock

      - name: Send notification and force close
        timeout-minutes: 1
        shell: bash
        run: |
          set +e

          LOG_FILE="/tmp/tripguide-send.log"

          node .github/scripts/send-tripguide-notification.js > "$LOG_FILE" 2>&1 &
          NODE_PID=$!

          for i in {1..30}; do
            if grep -Eq "attempted=[0-9]+ success=[0-9]+ failure=[0-9]+ cleaned=[0-9]+" "$LOG_FILE"; then
              cat "$LOG_FILE"
              echo "Notification summary detected. Force closing sender."
              kill -9 "$NODE_PID" 2>/dev/null || true
              pkill -9 -P $$ node 2>/dev/null || true
              exit 0
            fi

            if ! kill -0 "$NODE_PID" 2>/dev/null; then
              wait "$NODE_PID"
              STATUS=$?
              cat "$LOG_FILE"
              exit "$STATUS"
            fi

            sleep 1
          done

          cat "$LOG_FILE"
          echo "Notification sender timed out before summary."
          kill -9 "$NODE_PID" 2>/dev/null || true
          pkill -9 -P $$ node 2>/dev/null || true
          exit 1
