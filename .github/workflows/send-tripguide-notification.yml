name: Send TripGuide Notification

on:
  workflow_dispatch:
    inputs:
      title:
        description: Notification title
        required: true
        type: string
      body:
        description: Notification body
        required: true
        type: string
      url:
        description: Click URL
        required: false
        default: /TripGuide/
        type: string
      targetType:
        description: Send target
        required: true
        default: allActive
        type: choice
        options:
          - allActive
          - adminsOnly
          - approvedViewers
          - singleUser
      uid:
        description: Required when targetType is singleUser
        required: false
        type: string

jobs:
  send-notification:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read

    env:
      FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
      FIREBASE_DATABASE_URL: ${{ secrets.FIREBASE_DATABASE_URL }}
      INPUT_TITLE: ${{ inputs.title }}
      INPUT_BODY: ${{ inputs.body }}
      INPUT_URL: ${{ inputs.url }}
      INPUT_TARGET_TYPE: ${{ inputs.targetType }}
      INPUT_UID: ${{ inputs.uid }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependency
        run: npm install firebase-admin@12 --no-audit --no-fund --no-package-lock

      - name: Send notification
        timeout-minutes: 1
        run: |
          set +e
          timeout 20s node .github/scripts/send-tripguide-notification.js 2>&1 | tee /tmp/tripguide-send.log
          status=${PIPESTATUS[0]}
          set -e

          if [ "$status" -eq 0 ]; then
            exit 0
          fi

          if [ "$status" -eq 124 ] && grep -Eq "attempted=[0-9]+ success=[0-9]+ failure=[0-9]+ cleaned=[0-9]+" /tmp/tripguide-send.log; then
            echo "Notification sent. Closing workflow."
            exit 0
          fi

          echo "Notification workflow failed before completion."
          exit "$status"
