name: Send TripGuide Notification

on:
  workflow_dispatch:
    inputs:
      title:
        description: Notification title
        required: true
        type: string
      body:
        description: Notification body
        required: true
        type: string
      url:
        description: Click URL
        required: false
        default: https://mdnadon112-sketch.github.io/TripGuide/
        type: string

jobs:
  send-notification:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read

    env:
      FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
      FIREBASE_DATABASE_URL: ${{ secrets.FIREBASE_DATABASE_URL }}
      INPUT_TITLE: ${{ inputs.title }}
      INPUT_BODY: ${{ inputs.body }}
      INPUT_URL: ${{ inputs.url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependency
        run: npm install firebase-admin@12 --no-audit --no-fund --no-package-lock

      - name: Send notification
        run: node .github/scripts/send-tripguide-notification.js
